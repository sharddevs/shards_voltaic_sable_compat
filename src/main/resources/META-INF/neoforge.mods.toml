modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/trevorgolden/voltaic_sable_compat/issues"

[[mods]]
modId = "voltaic_sable_compat"
version = "${file.jarVersion}"
displayName = "Voltaic-Sable Compat"
authors = "trevorgolden"
description = '''
Fixes duplication and disassembly issues when Voltaic-framework multiblocks (Ballistix, Electrodynamics, Nuclear-Science) are assembled into Sable sub-levels via Create: Aeronautics or similar.

Server-side only — players do not need this installed.
'''
displayURL = "https://github.com/trevorgolden/voltaic_sable_compat"
side = "SERVER"

# Dependencies
[[dependencies.voltaic_sable_compat]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.230,)"
ordering = "NONE"
side = "SERVER"

[[dependencies.voltaic_sable_compat]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "SERVER"

[[dependencies.voltaic_sable_compat]]
modId = "sable"
type = "required"
versionRange = "[1.2.0,)"
ordering = "AFTER"
side = "SERVER"

[[dependencies.voltaic_sable_compat]]
modId = "voltaic"
type = "required"
versionRange = "[1.0.0,)"
ordering = "AFTER"
side = "SERVER"
[[mixins]]
config = "voltaic_sable_compat.mixins.json"