modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/sharddevs/shards_voltaic_sable_compat/issues"

[[mods]]
modId = "shards_voltaic_sable_compat"
version = "${file.jarVersion}"
displayName = "Shard's Compats: Voltaic-Sable Compat"
authors = "sharddevs"
description = '''
Server-side compatibility mod bridging Voltaic and Sable, with optional Ballistix support.

With Voltaic + Sable: patches a block-duplication glitch on disassembly and fixes the
overworld-to-sublevel changeover so grid power survives the transition.

With Ballistix (optional): patches a dispenser bug where deploying does not subtract from
the dispenser's stack, and allows launchers and turrets to function while mounted on an
assembled Create: Aeronautics contraption.

Server-side only — players do not need this installed unless using these mods in conjuction in a single-player world.
'''
displayURL = "https://github.com/sharddevs/shards_voltaic_sable_compat"
side = "SERVER"

# Dependencies
[[dependencies.shards_voltaic_sable_compat]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.230,)"
ordering = "NONE"
side = "SERVER"

[[dependencies.shards_voltaic_sable_compat]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "SERVER"

[[dependencies.shards_voltaic_sable_compat]]
modId = "sable"
type = "required"
versionRange = "[1.2.0,)"
ordering = "AFTER"
side = "SERVER"

[[dependencies.shards_voltaic_sable_compat]]
modId = "voltaic"
type = "required"
versionRange = "[1.0.0,)"
ordering = "AFTER"
side = "SERVER"

[[dependencies.shards_voltaic_sable_compat]]
modId = "ballistix"
type = "optional"
versionRange = "[1.0.1,)"
ordering = "AFTER"
side = "SERVER"

[[mixins]]
config = "shards_voltaic_sable_compat.mixins.json"
